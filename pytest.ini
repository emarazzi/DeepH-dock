[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, use real data)
    slow: Slow tests

# Output settings
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra
    -rP
    --cov=deepx_dock
    --cov-report=term-missing

# Warnings
filterwarnings =
    ignore::DeprecationWarning

[coverage:run]
source = deepx_dock
omit = 
    */tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
precision = 2
